<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NVIDIA DLI · RAG & Agentic MCP 강의자료</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --ink:#16142B; --ink-soft:#4A4766; --mut:#8E8AAC;
    --violet:#5B3DF5; --violet-700:#3A1FC9; --violet-300:#B7A9FF;
    --wash:#F4F1FF; --wash-2:#FAF9FF; --line:#E8E4F8;
    --paper:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 15% -10%, #ECE7FF 0%, rgba(236,231,255,0) 60%),
      radial-gradient(1000px 700px at 110% 10%, #F0EBFF 0%, rgba(240,235,255,0) 55%),
      #EAE7F4;
    min-height:100vh;
  }
  .wrap{max-width:920px; margin:0 auto; padding:72px 24px 96px;}
  header{margin-bottom:40px;}
  .eyebrow{font-size:13px; font-weight:700; letter-spacing:.08em; color:var(--violet); text-transform:uppercase;}
  h1{font-size:32px; font-weight:800; letter-spacing:-.02em; margin:10px 0 8px;}
  .sub{font-size:15px; color:var(--ink-soft); line-height:1.6; margin:0;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:32px;}
  a.card{
    display:flex; flex-direction:column; gap:8px;
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    padding:22px 22px 20px; text-decoration:none; color:inherit;
    box-shadow:0 12px 30px -18px rgba(43,28,120,.25);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  a.card:hover{transform:translateY(-2px); box-shadow:0 18px 40px -18px rgba(43,28,120,.35);}
  .day-num{font-family:ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace; font-size:12px; font-weight:700; color:var(--violet); letter-spacing:.04em;}
  .day-title{font-size:16.5px; font-weight:800; letter-spacing:-.01em; line-height:1.4;}
  .day-desc{font-size:13px; color:var(--mut); line-height:1.5;}
  footer{margin-top:56px; font-size:12.5px; color:var(--mut);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">NVIDIA DLI</div>
    <h1>RAG & Agentic MCP 강의자료</h1>
    <p class="sub">Day 0부터 Day 4까지 — 딥러닝 기초, RAG 구조 설계, 고급 검색 전략, MCP 기반 에이전트 설계.</p>
  </header>
  <div class="grid">
    <a class="card" href="0/">
      <span class="day-num">DAY 0</span>
      <span class="day-title">딥러닝 기초 (Fundamentals of Deep Learning)</span>
    </a>
    <a class="card" href="1/">
      <span class="day-num">DAY 1</span>
      <span class="day-title">RAG 구조 설계의 핵심과 검색 품질 결정 요소</span>
    </a>
    <a class="card" href="2/">
      <span class="day-num">DAY 2</span>
      <span class="day-title">고급 검색 전략과 Agentic RAG</span>
    </a>
    <a class="card" href="3/">
      <span class="day-num">DAY 3</span>
      <span class="day-title">MCP와 FastMCP — RAG에서 세상으로</span>
    </a>
    <a class="card" href="4/">
      <span class="day-num">DAY 4</span>
      <span class="day-title">Resource 기반 MCP 설계</span>
    </a>
  </div>
  <footer>github.com/TunaLee/nvidia-dli</footer>
</div>
</body>
</html>
